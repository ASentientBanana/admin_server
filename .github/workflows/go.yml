# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Deploy admin server

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build
      run: GOOS=linux GOARCH=amd64 go build -o admin_server .

    - name: Debug key
      run: |
        echo "${{ secrets.SSH_KEY }}" | wc -l
        echo "${{ secrets.SSH_KEY }}" | head -1
        echo "${{ secrets.SSH_KEY }}" | tail -1

    - uses: burnett01/rsync-deployments@5.2
      with:
        switches: -havz
        remote_host: ${{ secrets.HOST }}
        remote_user: ${{ secrets.USER }}
        remote_key: ${{ secrets.SSH_KEY }}
        path: "admin_server"
        remote_path: "/home/pkol/services/admin_server/admin_server"

    - uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_KEY }}
        port: 22
        script: "pm2 restart admin_server"
  
